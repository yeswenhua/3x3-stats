<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#6366f1">
<meta name="description" content="3X3 时间管理数据统计">
<link rel="manifest" href="manifest.json">
<title>3X3 时间统计</title>
<style>
  :root {
    --bg: #f8f9fc;
    --card: #fff;
    --text: #1e293b;
    --text2: #64748b;
    --border: #e2e8f0;
    --accent: #6366f1;
    --accent2: #818cf8;
    --shadow: 0 1px 3px rgba(0,0,0,.08);
  }
  @media (prefers-color-scheme:dark) {
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #e2e8f0;
      --text2: #94a3b8;
      --border: #334155;
      --shadow: 0 1px 3px rgba(0,0,0,.3);
    }
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
  }

  .container { max-width: 960px; margin:0 auto; padding: 16px; }

  header {
    text-align: center;
    padding: 24px 0 16px;
  }
  header h1 {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  header p {
    color: var(--text2);
    font-size: .85rem;
    margin-top: 4px;
  }

  /* 状态栏 */
  #loading { text-align:center; padding:40px; color:var(--text2); }
  #loading.hidden { display:none; }
  .spinner {
    display: inline-block;
    width: 24px; height: 24px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg) } }

  /* 概览卡片 */
  #stats-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }
  .stat-card {
    background: var(--card);
    border-radius: 12px;
    padding: 16px;
    box-shadow: var(--shadow);
    text-align: center;
  }
  .stat-card .value {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--accent);
  }
  .stat-card .label {
    font-size: .8rem;
    color: var(--text2);
    margin-top: 2px;
  }

  /* 时间粒度选择器 */
  #period-selector {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 16px;
  }
  #period-selector button {
    padding: 6px 20px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text2);
    border-radius: 20px;
    font-size: .88rem;
    cursor: pointer;
    transition: all .2s;
  }
  #period-selector button:hover {
    border-color: var(--accent2);
    color: var(--accent);
  }
  #period-selector button.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  /* 图表区域 */
  .chart-section {
    background: var(--card);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .chart-section h2 {
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 12px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .chart-wrapper {
    position: relative;
    width: 100%;
  }
  .chart-wrapper canvas { width: 100% !important; }

  /* 图例切换 */
  .legend-toggle {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 10px;
  }
  .legend-toggle .tag {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    border-radius: 14px;
    font-size: .78rem;
    cursor: pointer;
    opacity: .85;
    border: 1px solid transparent;
    transition: all .15s;
  }
  .legend-toggle .tag:hover { opacity: 1; }
  .legend-toggle .tag.hidden { opacity: .35; text-decoration: line-through; }

  /* 响应式 */
  @media (max-width: 480px) {
    .container { padding: 10px; }
    header h1 { font-size: 1.25rem; }
    .chart-section { padding: 12px; }
  }

  #app.hidden { display: none; }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>&#x23F1; 3X3 时间统计</h1>
    <p id="update-info">加载中...</p>
  </header>

  <div id="loading"><div class="spinner"></div><p style="margin-top:12px">正在加载数据...</p></div>

  <div id="app" class="hidden">
    <div id="stats-cards"></div>

    <div id="period-selector">
      <button data-period="weekly" class="active">&#x1F4C5; 按周</button>
      <button data-period="monthly">&#x1F4C6; 按月</button>
      <button data-period="yearly">&#x1F5D3; 按年</button>
    </div>

    <div class="chart-section">
      <h2>&#x1F4CA; 时间消耗趋势</h2>
      <div class="chart-wrapper">
        <canvas id="trendChart"></canvas>
      </div>
    </div>

    <div class="chart-section">
      <h2>&#x1F967; 分类分布</h2>
      <div class="chart-wrapper">
        <canvas id="distChart"></canvas>
      </div>
    </div>

    <div class="chart-section" id="daily-section" style="display:none">
      <h2>&#x1F4C6; 日详情</h2>
      <p style="font-size:.85rem;color:var(--text2);margin-bottom:8px">
        点击上方趋势图中的数据点查看当日分类详情
      </p>
      <div class="chart-wrapper">
        <canvas id="dailyChart"></canvas>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script>
(async function() {
  'use strict';

  let data = null;
  let currentPeriod = 'weekly';
  let trendChart = null;
  let distChart = null;
  let dailyChart = null;
  let clickedDate = null;

  // ─── 加载数据 ───────────────────────────────
  try {
    const resp = await fetch('data/stats.json');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    data = await resp.json();
  } catch (e) {
    document.getElementById('loading').innerHTML =
      '<p style="color:#ef4444;font-size:1.1rem">&#x26A0; 加载失败</p>' +
      '<p style="font-size:.85rem;color:var(--text2)">请确保 data/stats.json 文件存在</p>';
    return;
  }

  // ─── 渲染页面 ───────────────────────────────

  const m = data.meta;
  document.getElementById('update-info').textContent =
    '更新于 ' + m.generated_at.slice(0, 10) + ' · ' +
    '共计 ' + m.total_hours + ' 小时 · ' +
    '数据范围 ' + m.date_range.from + ' ~ ' + m.date_range.to;

  document.getElementById('loading').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');

  // 概览卡片
  const cards = document.getElementById('stats-cards');
  const hoursPerDay = (m.total_hours / (m.total_blocks || 1) * 10 || 0).toFixed(0);
  cards.innerHTML =
    '<div class="stat-card"><div class="value">' + m.total_hours + 'h</div><div class="label">总时长</div></div>' +
    '<div class="stat-card"><div class="value">' + m.total_blocks + '</div><div class="label">记录条数</div></div>' +
    '<div class="stat-card"><div class="value">' + data.categories.length + '</div><div class="label">分类数</div></div>' +
    '<div class="stat-card"><div class="value">' + (m.total_hours / 24).toFixed(1) + '天</div><div class="label">合整天数</div></div>';

  // ─── 分类颜色表 ───────────────────────────────

  const catColors = {};
  const colorPool = [
    '#6366f1','#22c55e','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#ec4899',
    '#14b8a6','#f97316','#84cc16','#3b82f6','#a855f7','#e11d48','#0ea5e9',
    '#10b981','#f43f5e','#8b5cf6','#d946ef','#0d9488','#eab308','#4ade80',
    '#fb923c','#a78bfa','#2dd4bf','#fbbf24','#34d399','#f87171','#818cf8',
    '#a3e635','#7dd3fc','#f472b6','#67e8f9'
  ];
  data.categories.forEach((c, i) => {
    catColors[c.name] = colorPool[i % colorPool.length];
  });

  // ─── 时间周期切换 ────────────────────────────

  document.getElementById('period-selector').addEventListener('click', e => {
    const btn = e.target.closest('button');
    if (!btn) return;
    currentPeriod = btn.dataset.period;
    document.querySelectorAll('#period-selector button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTrend();
    renderDist();
  });

  // ─── 趋势图 ─────────────────────────────────

  function getSortedCats() {
    const totals = {};
    data.blocks.forEach(b => {
      totals[b.category] = (totals[b.category] || 0) + b.duration_min;
    });
    return Object.entries(totals)
      .sort((a, b) => b[1] - a[1])
      .map(([name]) => name)
      .slice(0, 12);
  }

  function renderTrend() {
    const agg = data.aggregates[currentPeriod];
    const topCats = getSortedCats();
    const labels = agg.map(a => a.key);
    const datasets = topCats.map(catName => {
      const cat = data.categories.find(c => c.name === catName);
      const values = agg.map(a => Math.round((a.categories[catName] || 0) / 60 * 10) / 10);
      return {
        label: cat ? (cat.icon + ' ' + cat.name) : catName,
        data: values,
        borderColor: catColors[catName],
        backgroundColor: catColors[catName] + '20',
        tension: 0.3,
        pointRadius: currentPeriod === 'yearly' ? 4 : (currentPeriod === 'monthly' ? 3 : 2),
        pointHoverRadius: 6,
        fill: false,
        hidden: false
      };
    });

    // 累计总量线
    const totalValues = agg.map(a => Math.round(a.total / 60 * 10) / 10);
    datasets.push({
      label: '📊 总计',
      data: totalValues,
      borderColor: 'rgba(148,163,184,.5)',
      backgroundColor: 'transparent',
      borderDash: [5, 3],
      borderWidth: 1.5,
      tension: .3,
      pointRadius: 0,
      order: 1,
      hidden: false
    });

    // 周期标签翻译
    const periodLabel = { weekly: '周', monthly: '月', yearly: '年' }[currentPeriod];

    if (trendChart) trendChart.destroy();
    const ctx = document.getElementById('trendChart').getContext('2d');
    trendChart = new Chart(ctx, {
      type: 'line',
      data: { labels, datasets },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        aspectRatio: window.innerWidth < 500 ? 1.2 : 2,
        interaction: { mode: 'index', intersect: false },
        onClick: (e, elements) => {
          if (elements.length > 0) {
            const idx = elements[0].index;
            clickedDate = labels[idx];
            renderDaily();
            document.getElementById('daily-section').style.display = '';
            document.getElementById('daily-section').scrollIntoView({ behavior: 'smooth' });
          }
        },
        plugins: {
          tooltip: {
            callbacks: {
              label: ctx => ctx.dataset.label + ': ' + ctx.parsed.y.toFixed(1) + 'h'
            }
          },
          legend: {
            position: 'bottom',
            labels: {
              boxWidth: 12,
              boxHeight: 12,
              padding: 10,
              font: { size: 11 },
              usePointStyle: true,
              color: getComputedStyle(document.documentElement).getPropertyValue('--text').trim()
            }
          }
        },
        scales: {
          x: {
            title: { display: true, text: periodLabel, font: { size: 12 } },
            ticks: { font: { size: 10 }, maxTicksLimit: 15 },
            grid: { color: getComputedStyle(document.documentElement).getPropertyValue('--border').trim() }
          },
          y: {
            title: { display: true, text: '小时', font: { size: 12 } },
            beginAtZero: true,
            ticks: { font: { size: 10 }, callback: v => v + 'h' },
            grid: { color: getComputedStyle(document.documentElement).getPropertyValue('--border').trim() }
          }
        }
      }
    });
  }

  // ─── 分布图 ─────────────────────────────────

  function renderDist() {
    const agg = data.aggregates[currentPeriod];
    const totals = {};
    agg.forEach(a => {
      Object.entries(a.categories).forEach(([cat, mins]) => {
        totals[cat] = (totals[cat] || 0) + mins;
      });
    });
    const sorted = Object.entries(totals).sort((a, b) => b[1] - a[1]);
    const top = sorted.slice(0, 10);
    const others = sorted.slice(10).reduce((s, [, v]) => s + v, 0);
    if (others > 0) top.push(['其他', others]);

    const catList = data.categories;
    const labels = top.map(([name]) => {
      const c = catList.find(cc => cc.name === name);
      return c ? c.icon + ' ' + name : name;
    });
    const values = top.map(([, v]) => Math.round(v / 60 * 10) / 10);

    if (distChart) distChart.destroy();
    const ctx = document.getElementById('distChart').getContext('2d');
    distChart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels,
        datasets: [{
          data: values,
          backgroundColor: top.map(([name]) => catColors[name] || '#94a3b8'),
          borderColor: 'transparent',
          borderWidth: 0
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        aspectRatio: window.innerWidth < 500 ? 1 : 1.4,
        plugins: {
          tooltip: {
            callbacks: {
              label: ctx => {
                const total = ctx.dataset.data.reduce((a, b) => a + b, 0);
                const pct = ((ctx.parsed / total) * 100).toFixed(1);
                return ctx.label + ': ' + ctx.parsed.toFixed(1) + 'h (' + pct + '%)';
              }
            }
          },
          legend: {
            position: 'bottom',
            labels: {
              boxWidth: 12,
              boxHeight: 12,
              padding: 8,
              font: { size: 10 },
              usePointStyle: true,
              color: getComputedStyle(document.documentElement).getPropertyValue('--text').trim()
            }
          }
        }
      }
    });
  }

  // ─── 日详情图 ────────────────────────────────

  function renderDaily() {
    if (!clickedDate) return;

    const field = { weekly: 'week', monthly: 'month', yearly: 'year' }[currentPeriod] || 'date';
    let dateBlocks = data.blocks.filter(b => b[field] === clickedDate);

    const titleText = dateBlocks.length > 0
      ? '📅 ' + clickedDate + ' 详情 (' + dateBlocks.length + ' 条记录)'
      : '📅 ' + clickedDate + ' (无数据)';
    document.getElementById('daily-section').querySelector('h2').textContent = titleText;

    if (dateBlocks.length === 0) {
      if (dailyChart) { dailyChart.destroy(); dailyChart = null; }
      return;
    }

    const catTotals = {};
    dateBlocks.forEach(b => {
      catTotals[b.category] = (catTotals[b.category] || 0) + b.duration_min;
    });
    const sorted = Object.entries(catTotals).sort((a, b) => b[1] - a[1]);
    const labels = sorted.map(([name]) => name);
    const values = sorted.map(([, mins]) => Math.round(mins / 60 * 100) / 100);
    const colors = sorted.map(([name]) => catColors[name] || '#94a3b8');

    if (dailyChart) dailyChart.destroy();
    const ctx = document.getElementById('dailyChart').getContext('2d');

    dailyChart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          label: '小时',
          data: values,
          backgroundColor: colors,
          borderRadius: 6,
          borderWidth: 0
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => ctx.parsed.y.toFixed(2) + 'h'
            }
          }
        },
        scales: {
          x: {
            ticks: { font: { size: 9 }, maxRotation: 45 },
            grid: { display: false }
          },
          y: {
            beginAtZero: true,
            ticks: { callback: v => v + 'h', font: { size: 10 } }
          }
        }
      }
    });
  }

  // ─── 初始渲染 ────────────────────────────────

  renderTrend();
  renderDist();

  window.addEventListener('resize', () => {
    renderTrend();
    renderDist();
  });
})();
</script>

<!-- PWA 注册 -->
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>

</body>
</html>
