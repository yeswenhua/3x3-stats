<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#6366f1">
<meta name="description" content="3X3 时间管理数据统计">
<link rel="manifest" href="manifest.json">
<title>3X3 时间统计</title>
<style>
:root{--bg:#f8f9fc;--card:#fff;--text:#1e293b;--text2:#64748b;--border:#e2e8f0;--accent:#6366f1;--accent2:#818cf8;--shadow:0 1px 3px rgba(0,0,0,.08)}
@media(prefers-color-scheme:dark){:root{--bg:#0f172a;--card:#1e293b;--text:#e2e8f0;--text2:#94a3b8;--border:#334155;--shadow:0 1px 3px rgba(0,0,0,.3)}}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}

/* 布局: 桌面双栏 */
.app-layout{display:flex;gap:16px;align-items:flex-start;max-width:1200px;margin:0 auto;padding:16px}
.sidebar{width:300px;flex-shrink:0;position:sticky;top:16px;max-height:calc(100vh-32px);overflow-y:auto}
.main{flex:1;min-width:0}

/* 移动端单栏 */
@media(max-width:768px){
  .app-layout{flex-direction:column;padding:10px}
  .sidebar{width:100%;position:static;max-height:none}
}

header{text-align:center;padding:16px 0 10px}
header h1{font-size:1.3rem;font-weight:700;color:var(--accent)}
header p{color:var(--text2);font-size:.8rem;margin-top:2px}
#loading{text-align:center;padding:40px;color:var(--text2)}
#loading.hidden{display:none}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#app.hidden{display:none}

/* 统计卡片 */
#stats-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:12px}
.stat-card{background:var(--card);border-radius:10px;padding:10px;box-shadow:var(--shadow);text-align:center}
.stat-card .value{font-size:1.2rem;font-weight:700;color:var(--accent)}
.stat-card .label{font-size:.72rem;color:var(--text2);margin-top:2px}

/* 侧边栏筛选 */
.filter-section{background:var(--card);border-radius:10px;padding:12px;margin-bottom:10px;box-shadow:var(--shadow)}
.filter-section h3{font-size:.85rem;font-weight:600;color:var(--text);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.filter-row{display:flex;flex-wrap:wrap;align-items:center;gap:5px;margin-bottom:6px;font-size:.8rem}
.filter-row:last-child{margin-bottom:0}
.filter-row label{color:var(--text2);display:flex;align-items:center;gap:3px;cursor:pointer;font-size:.78rem}
.filter-row input[type=checkbox]{accent-color:var(--accent);width:13px;height:13px}
.btn-group{display:flex;gap:3px;flex-wrap:wrap}
.btn-group button{padding:3px 10px;border:1px solid var(--border);background:var(--card);color:var(--text2);border-radius:12px;font-size:.75rem;cursor:pointer;transition:all .15s}
.btn-group button:hover{border-color:var(--accent2);color:var(--accent)}
.btn-group button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
input[type=date]{padding:2px 5px;border:1px solid var(--border);border-radius:5px;background:var(--card);color:var(--text);font-size:.75rem}
input[type=range]{accent-color:var(--accent);width:80px;height:3px;vertical-align:middle}
.range-label{font-size:.78rem;color:var(--text2);min-width:60px}

/* 图表区 */
.main .chart-section{background:var(--card);border-radius:10px;padding:12px;margin-bottom:10px;box-shadow:var(--shadow)}
.main .chart-section h2{font-size:.9rem;font-weight:600;margin-bottom:6px;color:var(--text)}
.chart-wrapper{position:relative;width:100%}
.chart-wrapper canvas{width:100%!important}

/* 饼图容器 */
#pie-wrapper canvas{max-height:500px}

#cat-level-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
#cat-breadcrumb{font-size:.78rem;color:var(--text2);display:none}
#cat-back{cursor:pointer;color:var(--accent);text-decoration:none;font-weight:600}
</style>
</head>
<body>
<div class="container">
  <header><h1>⏱ 3X3 时间统计</h1><p id="update-info">加载中...</p></div>
  <div id="loading"><div class="spinner"></div><p style="margin-top:10px">正在加载数据...</p></div>
  <div id="app" class="hidden">
    <div class="app-layout">
      <!-- 侧边栏 -->
      <div class="sidebar">
        <div id="stats-cards"></div>

        <div class="filter-section">
          <h3>📅 时间范围</h3>
          <div class="filter-row">
            <div class="btn-group" id="range-btns">
              <button data-range="this-week">本周</button>
              <button data-range="this-month">本月</button>
              <button data-range="this-year">本年</button>
              <button data-range="all">All</button>
              <button data-range="custom">自定</button>
            </div>
          </div>
          <div class="filter-row">
            <input type="date" id="date-from" disabled style="flex:1;min-width:0">
            <span style="color:var(--text2)">~</span>
            <input type="date" id="date-to" disabled style="flex:1;min-width:0">
          </div>
        </div>

        <div class="filter-section">
          <h3>📆 星期</h3>
          <div class="filter-row">
            <label><input type="checkbox" class="dow-cb" value="1" checked>一</label>
            <label><input type="checkbox" class="dow-cb" value="2" checked>二</label>
            <label><input type="checkbox" class="dow-cb" value="3" checked>三</label>
            <label><input type="checkbox" class="dow-cb" value="4" checked>四</label>
            <label><input type="checkbox" class="dow-cb" value="5" checked>五</label>
            <label><input type="checkbox" class="dow-cb" value="6" checked>六</label>
            <label><input type="checkbox" class="dow-cb" value="7" checked>日</label>
          </div>
        </div>

        <div class="filter-section">
          <h3>🎯 标签显示范围</h3>
          <div class="filter-row">
            <span class="range-label" id="range-label">0h ~ 24h</span>
          </div>
          <div class="filter-row">
            <input type="range" id="min-hours-low" min="0" max="24" step="0.5" value="0" style="flex:1">
          </div>
          <div class="filter-row">
            <input type="range" id="min-hours-high" min="0" max="24" step="0.5" value="24" style="flex:1">
          </div>
        </div>

        <div class="filter-section">
          <h3>🏷️ 分类层级</h3>
          <div class="filter-row" id="cat-level-row">
            <span id="cat-breadcrumb" style="font-size:.78rem"><a id="cat-back">← 返回</a><span id="cat-current"></span></span>
            <span id="cat-level-label" style="font-size:.75rem;color:var(--text2)">点击图中的线可钻取下一级</span>
          </div>
        </div>
      </div>

      <!-- 主体 -->
      <div class="main">
        <div class="chart-section">
          <h2>📊 总时间</h2>
          <div class="chart-wrapper"><canvas id="totalChart"></canvas></div>
        </div>
        <div class="chart-section">
          <h2>📈 分类时间趋势</h2>
          <div class="chart-wrapper"><canvas id="trendChart"></canvas></div>
        </div>
        <div class="chart-section">
          <h2>🥧 单日分类分布</h2>
          <div class="chart-wrapper"><canvas id="pieChart"></canvas></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="chart.umd.min.js"></script>
<script>
(async function(){
'use strict';

// ─── 状态 ────────────────────────────────────
let data = null;
let totalChart = null, trendChart = null, pieChart = null;
let currentRange = 'this-week';
let fromDate = '', toDate = '';
let drillPath = [];        // 钻取路径: [] = 上层, ['1.学习🥺'] = 二级, ['2.充分利用','爱呀'] = 三级
const catColors = {};
const colorPool = ['#6366f1','#22c55e','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#ec4899','#14b8a6','#f97316','#84cc16','#3b82f6','#a855f7','#e11d48','#0ea5e9','#10b981','#f43f5e','#d946ef','#0d9488','#eab308','#4ade80','#fb923c','#a78bfa','#2dd4bf','#fbbf24','#34d399','#f87171','#818cf8','#a3e635','#f472b6','#67e8f9'];
const subColorPool = ['#a78bfa','#6ee7b7','#fde68a','#fca5a5','#7dd3fc','#c4b5fd','#d9f99d','#fecaca','#bae6fd','#f5d0fe','#a7f3d0','#fbbf24','#86efac','#a5b4fc','#e0f2fe','#fed7aa','#ddd6fe','#bfdbfe','#bbf7d0','#fda4af'];

// ─── 数据加载 ────────────────────────────────
try {
  if(typeof Chart==='undefined')throw new Error('Chart.js 加载失败');
  const resp = await fetch('data/stats.json');
  if (!resp.ok) throw new Error('HTTP '+resp.status);
  data = await resp.json();
} catch(e){
  document.getElementById('loading').innerHTML='<p style="color:#ef4444">⚠ 加载失败: '+e.message+'</p>';
  return;
}

// ─── 工具 ────────────────────────────────────
function pad2(n){return n<10?'0'+n:''+n}
function dateStr(d){return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate())}
function getDow(w){const d=new Date(w+'T00:00:00');const r=d.getDay();return r===0?7:r}

// ─── 颜色 ────────────────────────────────────
const groupColorMap = {};
data.group_info.forEach(g=>{groupColorMap[g.name]=g.color});
data.categories.forEach((c,i)=>{catColors[c.name]=c.color||colorPool[i%colorPool.length]});

// ─── 层级工具 ──────────────────────────────
function getCurrentLevelNodes(){
  // 根据 drillPath 返回当前层节点列表
  let nodes = data.hierarchy;
  for(const name of drillPath){
    const found = nodes.find(n=>n.name===name);
    if(!found||!found.children)return [];
    nodes = found.children;
  }
  return nodes;
}
function getLeafTags(nodes){
  // 收集指定节点列表下所有 all_tags
  const set = new Set();
  function walk(list){list.forEach(n=>{n.all_tags.forEach(t=>set.add(t));if(n.children)walk(n.children)})}
  walk(nodes);
  return set;
}
function getBreadcrumbText(){
  if(drillPath.length===0)return '';
  return ' > '+drillPath.join(' > ');
}
const subColorIdx={};
function getCatColor(name){
  if(drillPath.length===0)return groupColorMap[name]||'#94a3b8';
  if(!subColorIdx[name])subColorIdx[name]=subColorPool[Object.keys(subColorIdx).length%subColorPool.length];
  return subColorIdx[name];
}
// 二级分类按钮是否激活：drillPath 非空
const isSubView=()=>drillPath.length>0;

// ─── 初始化 UI ──────────────────────────────
(function(){
  const m=data.meta;
  document.getElementById('update-info').textContent='更新于 '+m.generated_at.slice(0,10)+' · 共 '+m.total_hours+'h · '+m.date_range.from+' ~ '+m.date_range.to;
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('stats-cards').innerHTML=
    '<div class="stat-card"><div class="value">'+m.total_hours+'h</div><div class="label">总时长</div></div>'+
    '<div class="stat-card"><div class="value">'+m.total_blocks+'</div><div class="label">记录</div></div>'+
    '<div class="stat-card"><div class="value">'+data.hierarchy.length+'</div><div class="label">上层分类</div></div>'+
    '<div class="stat-card"><div class="value">'+data.categories.length+'</div><div class="label">全部分类</div></div>';
  const mr=data.meta.date_range;
  document.getElementById('date-from').min=mr.from;document.getElementById('date-from').max=mr.to;document.getElementById('date-from').value=mr.from;
  document.getElementById('date-to').min=mr.from;document.getElementById('date-to').max=mr.to;document.getElementById('date-to').value=mr.to;
})();

// ─── 日期范围计算 ──────────────────────────
function getComputedRange(){
  if(currentRange==='this-week'){
    const now=new Date();const d=now.getDay()||7;
    const mon=new Date(now);mon.setDate(now.getDate()-d+1);
    const sun=new Date(mon);sun.setDate(mon.getDate()+6);
    return{f:dateStr(mon),t:dateStr(sun)};
  }
  if(currentRange==='this-month'){
    const now=new Date();
    return{f:now.getFullYear()+'-'+pad2(now.getMonth()+1)+'-01',t:dateStr(now)};
  }
  if(currentRange==='this-year'){
    const now=new Date();
    return{f:now.getFullYear()+'-'+pad2(1)+'-01',t:dateStr(now)};
  }
  if(currentRange==='all'){
    const mr=data.meta.date_range;
    return{f:mr.from,t:mr.to};
  }
  return{f:fromDate,t:toDate};
}

// ─── 数据过滤 ──────────────────────────────
function filterBlocks(blocks){
  if(currentRange!=='custom'){const{f,t}=getComputedRange();fromDate=f;toDate=t}
  blocks=blocks.filter(b=>b.date>=fromDate&&b.date<=toDate);
  const dows=[];document.querySelectorAll('.dow-cb:checked').forEach(cb=>dows.push(parseInt(cb.value)));
  if(dows.length<7)blocks=blocks.filter(b=>dows.includes(getDow(b.date)));
  return blocks;
}
function aggregateByDay(blocks){
  const days={};
  blocks.forEach(b=>{
    if(!days[b.date])days[b.date]={categories:{},total:0};
    if(!days[b.date].categories[b.category])days[b.date].categories[b.category]=0;
    days[b.date].categories[b.category]+=b.duration_min;
    days[b.date].total+=b.duration_min;
  });
  return Object.entries(days).sort((a,b)=>a[0].localeCompare(b[0])).map(([date,day])=>({date,day,hours:Math.round(day.total/60*10)/10}));
}

// ─── 对指定 blocks 按当前层级聚合 ──────────
function aggregateByLevel(blocks){
  const nodes=getCurrentLevelNodes();
  const totals={};
  nodes.forEach(n=>{
    const leafTags=new Set(n.all_tags);
    let mins=0;
    blocks.forEach(b=>{if(leafTags.has(b.category))mins+=b.duration_min});
    totals[n.name]=Math.round(mins/60*10)/10;
  });
  return totals;
}

// ─── 更新滑块范围 ──────────────────────────
function updateSliderBounds(){
  const blocks=filterBlocks(data.blocks.slice());
  const days=aggregateByDay(blocks);
  const maxH=Math.ceil(Math.max(...days.map(d=>d.hours),0))||24;
  const low=document.getElementById('min-hours-low'),high=document.getElementById('min-hours-high');
  low.max=maxH;high.max=maxH;
  if(parseFloat(low.value)>maxH)low.value=maxH;
  if(parseFloat(high.value)>maxH)high.value=maxH;
  document.getElementById('range-label').textContent=parseFloat(low.value)+'h ~ '+parseFloat(high.value)+'h';
}

// ─── 渲染总图 ──────────────────────────────
function renderTotal(){
  const blocks=filterBlocks(data.blocks.slice());
  const days=aggregateByDay(blocks);
  if(days.length===0){if(totalChart){totalChart.destroy();totalChart=null}return;}
  const labels=days.map(d=>d.date);
  const totals=aggregateByLevel(blocks);
  const activeNames=Object.keys(totals);
  const values=days.map(d=>{
    let sum=0;
    activeNames.forEach(name=>{
      const node=getCurrentLevelNodes().find(n=>n.name===name);
      if(node){const ts=new Set(node.all_tags);Object.entries(d.day.categories).forEach(([c,m])=>{if(ts.has(c))sum+=m})}
    });
    return Math.round(sum/60*10)/10;
  });
  const hasDots=labels.length<60;
  if(totalChart)totalChart.destroy();
  const ctx=document.getElementById('totalChart').getContext('2d');
  totalChart=new Chart(ctx,{
    type:'line',data:{labels,datasets:[{label:'总时长',data:values,borderColor:'#6366f1',backgroundColor:'rgba(99,102,241,0.1)',fill:true,tension:.3,pointRadius:hasDots?2:0,pointHoverRadius:5,borderWidth:2}]},
    options:{
      responsive:true,maintainAspectRatio:true,aspectRatio:window.innerWidth<500?2:4,
      interaction:{mode:'index',intersect:false},
      scales:{
        x:{ticks:{font:{size:9},maxTicksLimit:15},grid:{color:getComputedStyle(document.documentElement).getPropertyValue('--border').trim()}},
        y:{beginAtZero:false,title:{display:true,text:'小时',font:{size:11}},ticks:{font:{size:9},callback:v=>v+'h'},grid:{color:getComputedStyle(document.documentElement).getPropertyValue('--border').trim()}}
      },
      plugins:{tooltip:{callbacks:{label:ctx=>'总时长: '+ctx.parsed.y.toFixed(1)+'h'}},legend:{display:false}}
    }
  });
}

// ─── 渲染分类趋势 ──────────────────────────
function renderTrend(){
  const blocks=filterBlocks(data.blocks.slice());
  // 滑块过滤
  const low=parseFloat(document.getElementById('min-hours-low').value);
  const high=parseFloat(document.getElementById('min-hours-high').value);
  const allDays=aggregateByDay(blocks);
  const okDates={};
  allDays.forEach(d=>{if(d.hours>=low&&d.hours<=high)okDates[d.date]=1});
  const sBlocks=blocks.filter(b=>okDates[b.date]);

  const days=aggregateByDay(sBlocks);
  if(days.length===0){if(trendChart){trendChart.destroy();trendChart=null}return;}
  const labels=days.map(d=>d.date);
  const nodes=getCurrentLevelNodes();
  const hasDots=labels.length<60;

  const datasets=nodes.map(n=>{
    const leafTags=new Set(n.all_tags);
    const values=days.map(d=>{
      let mins=0;
      Object.entries(d.day.categories).forEach(([c,m])=>{if(leafTags.has(c))mins+=m});
      return Math.round(mins/60*10)/10;
    });
    return{label:n.name,data:values,borderColor:getCatColor(n.name),backgroundColor:getCatColor(n.name)+'20',pointBackgroundColor:getCatColor(n.name),tension:0.3,fill:false,pointRadius:hasDots?2:0,pointHoverRadius:4,borderWidth:1.5};
  });

  if(trendChart)trendChart.destroy();
  const ctx=document.getElementById('trendChart').getContext('2d');
  trendChart=new Chart(ctx,{
    type:'line',data:{labels,datasets},
    options:{
      responsive:true,maintainAspectRatio:true,aspectRatio:window.innerWidth<500?1.2:2.2,
      interaction:{mode:'nearest',intersect:false},
      onClick:(e,els)=>{
        if(els.length>0){
          const label=trendChart.data.datasets[els[0].datasetIndex].label;
          const nodes=getCurrentLevelNodes();
          const clicked=nodes.find(n=>n.name===label);
          if(clicked&&clicked.children&&clicked.children.length>0){
            drillPath.push(label);
            document.getElementById('cat-breadcrumb').style.display='inline';
            document.getElementById('cat-current').textContent=getBreadcrumbText();
            renderAll();return;
          }
        }
      },
      scales:{
        x:{ticks:{font:{size:9},maxTicksLimit:20},grid:{color:getComputedStyle(document.documentElement).getPropertyValue('--border').trim()}},
        y:{beginAtZero:true,title:{display:true,text:'小时',font:{size:11}},ticks:{font:{size:9},callback:v=>v+'h'},grid:{color:getComputedStyle(document.documentElement).getPropertyValue('--border').trim()}}
      },
      plugins:{
        tooltip:{callbacks:{title:items=>items[0].dataset.label,label:ctx=>ctx.parsed.y.toFixed(1)+'h'}},
        legend:{position:'bottom',labels:{boxWidth:4,boxHeight:4,padding:4,font:{size:8},color:getComputedStyle(document.documentElement).getPropertyValue('--text').trim()},onClick:(e,legendItem)=>{const meta=trendChart.getDatasetMeta(legendItem.datasetIndex);meta.hidden=meta.hidden===null?!trendChart.data.datasets[legendItem.datasetIndex].hidden:!meta.hidden;trendChart.update()}}
      }
    }
  });
}

// ─── 饼图 ──────────────────────────────────
function renderPie(){
  const blocks=filterBlocks(data.blocks.slice());
  const low=parseFloat(document.getElementById('min-hours-low').value);
  const high=parseFloat(document.getElementById('min-hours-high').value);
  const allDays=aggregateByDay(blocks);
  const okDates={};
  allDays.forEach(d=>{if(d.hours>=low&&d.hours<=high)okDates[d.date]=1});
  const sBlocks=blocks.filter(b=>okDates[b.date]);
  if(sBlocks.length===0){if(pieChart){pieChart.destroy();pieChart=null}return;}

  const totals=aggregateByLevel(sBlocks);
  const sorted=Object.entries(totals).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  if(sorted.length===0)return;
  const labels=sorted.map(([k])=>k);
  const values=sorted.map(([,v])=>v);
  const colors=sorted.map(([k])=>getCatColor(k));
  const totalHours=values.reduce((a,b)=>a+b,0);
  if(totalHours===0)return;

  if(pieChart)pieChart.destroy();
  const ctx=document.getElementById('pieChart').getContext('2d');
  pieChart=new Chart(ctx,{
    type:'doughnut',
    data:{labels,datasets:[{data:values,backgroundColor:colors,borderColor:getComputedStyle(document.documentElement).getPropertyValue('--card').trim(),borderWidth:1}]},
    plugins:[pieLabels],
    options:{
      responsive:true,maintainAspectRatio:true,aspectRatio:window.innerWidth<500?1:1.6,
      cutout:'50%',
      plugins:{
        title:{display:true,text:'总分布 · '+totalHours.toFixed(1)+'h',font:{size:11}},
        tooltip:{callbacks:{label:ctx=>{const p=((ctx.parsed/totalHours)*100).toFixed(1);return ctx.label+': '+ctx.parsed.toFixed(1)+'h ('+p+'%)'}}},
        legend:{display:false}
      },
      onClick:(e,els)=>{
        if(els.length>0&&drillPath.length===0){
          const label=pieChart.data.labels[els[0].index];
          const nodes=getCurrentLevelNodes();
          const clicked=nodes.find(n=>n.name===label);
          if(clicked&&clicked.children&&clicked.children.length>0){
            drillPath.push(label);
            document.getElementById('cat-breadcrumb').style.display='inline';
            document.getElementById('cat-current').textContent=getBreadcrumbText();
            renderAll();
          }
        }
      }
    }
  });
}

// ─── 饼图内外标注插件 ───────────────────────
const pieLabels={id:'pieLabels',afterDraw(chart){
  const ctx=chart.ctx;const meta=chart.getDatasetMeta(0);if(!meta||!meta.data)return;
  const ca=chart.chartArea;const cx=ca.left+ca.width/2,cy=ca.top+ca.height/2;
  const first=meta.data[0];if(!first)return;
  const outerR=first.outerRadius,innerR=first.innerRadius,midR=(outerR+innerR)/2;
  const labels=chart.data.labels;const values=chart.data.datasets[0].data;const total=values.reduce((a,b)=>a+b,0);
  const isMobile=window.innerWidth<500;const fontSize=isMobile?9:10;
  ctx.font='bold '+fontSize+'px sans-serif';ctx.textBaseline='middle';
  let sa=-Math.PI/2;const sp=0.02;
  values.forEach((v,i)=>{
    if(v/total<0.008)return;
    const a=(v/total)*2*Math.PI-sp;const ma=sa+a/2;sa+=a+sp;
    const txt=labels[i]+' '+v.toFixed(1)+'h';const tw=ctx.measureText(txt).width;
    if(midR*a>tw*1.3){
      const x=cx+midR*Math.cos(ma)-tw/2,y=cy+midR*Math.sin(ma);
      ctx.fillStyle='rgba(255,255,255,.85)';ctx.fillRect(x-1,y-fontSize/2-1,tw+2,fontSize+2);
      ctx.fillStyle='#1e293b';ctx.textAlign='left';ctx.fillText(txt,x,y);
    } else {
      const ld=outerR*1.25;const x1=cx+outerR*Math.cos(ma),y1=cy+outerR*Math.sin(ma);
      const x2=cx+ld*Math.cos(ma),y2=cy+ld*Math.sin(ma);const ex=isMobile?40:55;
      const lx=x2+(ma>Math.PI/2&&ma<3*Math.PI/2?-1:1)*ex;
      ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.lineTo(lx,y2);
      ctx.strokeStyle='rgba(148,163,184,0.4)';ctx.lineWidth=0.8;ctx.stroke();
      ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue('--text').trim();
      ctx.textAlign=ma>Math.PI/2&&ma<3*Math.PI/2?'right':'left';
      ctx.fillText(txt,lx+(ma>Math.PI/2&&ma<3*Math.PI/2?-3:3),y2);
    }
  });
}};

// ─── 刷新全部 ──────────────────────────────
function renderAll(){renderTotal();renderTrend();renderPie()}

// ─── 绑定事件 ──────────────────────────────
document.querySelectorAll('#range-btns button').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('#range-btns button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentRange=btn.dataset.range;
    const cust=currentRange==='custom';
    document.getElementById('date-from').disabled=!cust;
    document.getElementById('date-to').disabled=!cust;
    if(!cust){const{f,t}=getComputedRange();document.getElementById('date-from').value=f;document.getElementById('date-to').value=t}
    else{fromDate=document.getElementById('date-from').value;toDate=document.getElementById('date-to').value}
    renderAll();updateSliderBounds();
  });
});
document.getElementById('date-from').addEventListener('change',function(){if(currentRange==='custom'){fromDate=this.value;renderAll();updateSliderBounds()}});
document.getElementById('date-to').addEventListener('change',function(){if(currentRange==='custom'){toDate=this.value;renderAll();updateSliderBounds()}});
document.querySelectorAll('.dow-cb').forEach(cb=>{cb.addEventListener('change',()=>{renderAll();updateSliderBounds()})});
function onRangeChange(){const l=parseFloat(document.getElementById('min-hours-low').value),h=parseFloat(document.getElementById('min-hours-high').value);
  document.getElementById('range-label').textContent=l+'h ~ '+h+'h';
  if(l>h){document.getElementById('min-hours-low').value=h;document.getElementById('min-hours-high').value=l}
  renderTrend();renderPie()}
document.getElementById('min-hours-low').addEventListener('input',onRangeChange);
document.getElementById('min-hours-high').addEventListener('input',function(){const l=parseFloat(document.getElementById('min-hours-low').value),h=parseFloat(this.value);document.getElementById('range-label').textContent=l+'h ~ '+h+'h';if(h<l){document.getElementById('min-hours-low').value=h;document.getElementById('min-hours-high').value=l}renderTrend();renderPie()});
// 返回上层
document.getElementById('cat-back').addEventListener('click',()=>{drillPath.pop();document.getElementById('cat-current').textContent=getBreadcrumbText();if(drillPath.length===0)document.getElementById('cat-breadcrumb').style.display='none';renderAll()});
window.addEventListener('resize',renderAll);

// 启动
document.querySelector('#range-btns .active').click();
})();
