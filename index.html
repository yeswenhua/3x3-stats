<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#6366f1">
<meta name="description" content="3X3 时间管理数据统计">
<link rel="manifest" href="manifest.json">
<title>3X3 时间统计</title>
<style>
:root{--bg:#f8f9fc;--card:#fff;--text:#1e293b;--text2:#64748b;--border:#e2e8f0;--accent:#6366f1;--accent2:#818cf8;--shadow:0 1px 3px rgba(0,0,0,.08);--warn:#ef4444}
@media(prefers-color-scheme:dark){:root{--bg:#0f172a;--card:#1e293b;--text:#e2e8f0;--text2:#94a3b8;--border:#334155;--shadow:0 1px 3px rgba(0,0,0,.3)}}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}
.container{max-width:960px;margin:0 auto;padding:16px}
header{text-align:center;padding:24px 0 16px}
header h1{font-size:1.5rem;font-weight:700;color:var(--accent);display:flex;align-items:center;justify-content:center;gap:8px}
header p{color:var(--text2);font-size:.85rem;margin-top:4px}
#loading{text-align:center;padding:40px;color:var(--text2)}
#loading.hidden{display:none}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#app.hidden{display:none}

/* 统计卡片 */
#stats-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:16px}
.stat-card{background:var(--card);border-radius:12px;padding:14px;box-shadow:var(--shadow);text-align:center}
.stat-card .value{font-size:1.4rem;font-weight:700;color:var(--accent)}
.stat-card .label{font-size:.78rem;color:var(--text2);margin-top:2px}

/* 筛选器 */
.filter-section{background:var(--card);border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:var(--shadow)}
.filter-row{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:8px}
.filter-row:last-child{margin-bottom:0}
.filter-row label{font-size:.85rem;color:var(--text2);display:flex;align-items:center;gap:4px;cursor:pointer}
.filter-row input[type=checkbox]{accent-color:var(--accent);width:16px;height:16px}
.filter-section .btn-group{display:flex;gap:4px;flex-wrap:wrap}
.filter-section .btn-group button{padding:4px 14px;border:1px solid var(--border);background:var(--card);color:var(--text2);border-radius:16px;font-size:.82rem;cursor:pointer;transition:all .15s}
.filter-section .btn-group button:hover{border-color:var(--accent2);color:var(--accent)}
.filter-section .btn-group button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.filter-section input[type=date]{padding:4px 8px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);font-size:.82rem}
.filter-section input[type=range]{accent-color:var(--accent);width:100px}
.filter-section .range-label{font-size:.82rem;color:var(--text2);min-width:50px}

/* 图表区 */
.chart-section{background:var(--card);border-radius:12px;padding:16px;margin-bottom:16px;box-shadow:var(--shadow)}
.chart-section h2{font-size:1rem;font-weight:600;margin-bottom:12px;color:var(--text);display:flex;align-items:center;gap:6px}
.chart-wrapper{position:relative;width:100%}
.chart-wrapper canvas{width:100%!important}
.chart-empty{text-align:center;padding:30px;color:var(--text2);font-size:.9rem}

/* 分类层级 */
#cat-level-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
#cat-level-row button{padding:4px 14px;border:1px solid var(--border);background:var(--card);color:var(--text2);border-radius:16px;font-size:.82rem;cursor:pointer;transition:all .15s}
#cat-level-row button:hover{border-color:var(--accent);color:var(--accent)}
#cat-level-row button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
#cat-breadcrumb{font-size:.82rem;color:var(--text2);display:none}
#cat-breadcrumb span{margin-left:4px}
#cat-back{cursor:pointer;color:var(--accent);text-decoration:none;font-weight:600}

/* 响应式 */
@media(max-width:480px){.container{padding:10px}header h1{font-size:1.25rem}.filter-row{gap:6px}.chart-section{padding:12px}}
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>⏱ 3X3 时间统计</h1>
    <p id="update-info">加载中...</p>
  </header>

  <div id="loading"><div class="spinner"></div><p style="margin-top:12px">正在加载数据...</p></div>

  <div id="app" class="hidden">
    <div id="stats-cards"></div>

    <!-- 筛选区 -->
    <div class="filter-section" id="filter-date">
      <div class="filter-row">
        <div class="btn-group" id="range-btns">
          <button data-range="this-week" class="active">本周</button>
          <button data-range="this-month">本月</button>
          <button data-range="this-year">本年</button>
          <button data-range="custom">自定义</button>
        </div>
        <input type="date" id="date-from" disabled>
        <span style="color:var(--text2)">~</span>
        <input type="date" id="date-to" disabled>
      </div>
    </div>

    <div class="filter-section" id="filter-options">
      <div class="filter-row">
        <label title="勾选要显示的星期"><input type="checkbox" class="dow-cb" value="1" checked> 一</label>
        <label><input type="checkbox" class="dow-cb" value="2" checked> 二</label>
        <label><input type="checkbox" class="dow-cb" value="3" checked> 三</label>
        <label><input type="checkbox" class="dow-cb" value="4" checked> 四</label>
        <label><input type="checkbox" class="dow-cb" value="5" checked> 五</label>
        <label><input type="checkbox" class="dow-cb" value="6" checked> 六</label>
        <label><input type="checkbox" class="dow-cb" value="7" checked> 日</label>
      </div>
      <div class="filter-row">
        <span style="font-size:.82rem;color:var(--text2)">日总时长范围</span>
        <input type="range" id="min-hours-low" min="0" max="24" step="0.5" value="0">
        <span class="range-label" id="range-label">0h ~ 24h</span>
        <input type="range" id="min-hours-high" min="0" max="24" step="0.5" value="24">
      </div>
    </div>

    <!-- 分类层级 -->
    <div class="filter-section" id="filter-cat">
      <div class="filter-row" id="cat-level-row">
        <div class="btn-group" id="cat-view-btns">
          <button data-view="group" class="active">上层分类</button>
          <button data-view="sub">二级分类</button>
        </div>
        <span id="cat-breadcrumb"><a id="cat-back">← 返回上层</a><span id="cat-current"></span></span>
      </div>
    </div>

    <!-- 趋势图 -->
    <div class="chart-section">
      <h2>📊 时间消耗趋势</h2>
      <div class="chart-wrapper"><canvas id="trendChart"></canvas></div>
      <div id="trend-empty" class="chart-empty hidden">该时间段暂无数据</div>
    </div>

    <!-- 单日饼图 -->
    <div class="chart-section">
      <h2>🥧 单日分类分布</h2>
      <div class="filter-row" style="margin-bottom:10px">
        <label>日期</label>
        <input type="date" id="pie-date">
        <label style="margin-left:8px"><input type="checkbox" id="pie-sync" checked> 跟随趋势图日期</label>
      </div>
      <div class="chart-wrapper"><canvas id="pieChart"></canvas></div>
      <div id="pie-empty" class="chart-empty hidden">选择日期查看分布</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script>
(async function(){
'use strict';

// ─── 状态 ────────────────────────────────────
let data = null;
let trendChart = null, pieChart = null;
let currentRange = 'this-week';
let fromDate = '', toDate = '';
let catView = 'group'; // 'group' | 'sub'
let expandedGroup = null; // 展开某个上级分类时的组名
let selPieDate = '';

const colorPool = [
  '#6366f1','#22c55e','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#ec4899','#14b8a6',
  '#f97316','#84cc16','#3b82f6','#a855f7','#e11d48','#0ea5e9','#10b981','#f43f5e',
  '#d946ef','#0d9488','#eab308','#4ade80','#fb923c','#a78bfa','#2dd4bf','#fbbf24',
  '#34d399','#f87171','#818cf8','#a3e635','#f472b6','#67e8f9'
];
const groupColors = { '运动':'#22c55e','日常':'#f59e0b','其他':'#94a3b8' };
const catColors = {};

// ─── 数据加载 ────────────────────────────────
try {
  const resp = await fetch('data/stats.json');
  if (!resp.ok) throw new Error('HTTP '+resp.status);
  data = await resp.json();
} catch(e){
  document.getElementById('loading').innerHTML='<p style="color:#ef4444">⚠ 加载失败</p><p style="font-size:.85rem;color:var(--text2)">请确保 data/stats.json 存在</p>';
  return;
}

// ─── 工具函数 ────────────────────────────────
function pad2(n){return n<10?'0'+n:''+n}
function dateStr(d){return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate())}
function getDow(w){const d=new Date(w+'T00:00:00');const r=d.getDay();return r===0?7:r}
function isToday(d){const n=new Date();return dateStr(n)===d}

// ─── 初始化顏色 ──────────────────────────────
data.blocks.forEach(b=>{if(!catColors[b.category])catColors[b.category]=colorPool[Object.keys(catColors).length%colorPool.length]})

// ─── 构建分类层级 ────────────────────────────
let groups = [];
(function buildGroups(){
  const gmap = {};
  data.blocks.forEach(b=>{
    if(!gmap[b.group])gmap[b.group]={name:b.group,icon:b.icon,cats:{},total:0};
    if(!gmap[b.group].cats[b.category])gmap[b.group].cats[b.category]={name:b.category,icon:b.icon,mins:0};
    gmap[b.group].cats[b.category].mins+=b.duration_min;
    gmap[b.group].total+=b.duration_min;
  });
  groups = Object.values(gmap).sort((a,b)=>b.total-a.total);
  // 保证 运动/日常/其他 排序
  const order = ['运动','日常','其他'];
  groups.sort((a,b)=>{const ia=order.indexOf(a.name),ib=order.indexOf(b.name);return (ia===-1?99:ia)-(ib===-1?99:ib)});
  groups.forEach(g=>{g.cats=Object.values(g.cats).sort((a,b)=>b.mins-a.mins)});
})();

// ─── 渲染概览 ────────────────────────────────
(function initUI(){
  const m=data.meta;
  document.getElementById('update-info').textContent='更新于 '+m.generated_at.slice(0,10)+' · 共 '+m.total_hours+' 小时 · '+m.date_range.from+' ~ '+m.date_range.to;
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('stats-cards').innerHTML=
    '<div class="stat-card"><div class="value">'+m.total_hours+'h</div><div class="label">总时长</div></div>'+
    '<div class="stat-card"><div class="value">'+m.total_blocks+'</div><div class="label">记录</div></div>'+
    '<div class="stat-card"><div class="value">'+groups.length+'</div><div class="label">上层分类</div></div>'+
    '<div class="stat-card"><div class="value">'+data.categories.length+'</div><div class="label">全部分类</div></div>';
  // 日期输入范围
  document.getElementById('date-from').min=m.date_range.from;document.getElementById('date-from').max=m.date_range.to;
  document.getElementById('date-from').value=m.date_range.from;
  document.getElementById('date-to').min=m.date_range.from;document.getElementById('date-to').max=m.date_range.to;
  document.getElementById('date-to').value=m.date_range.to;
  // 饼图日期
  selPieDate=m.date_range.to; document.getElementById('pie-date').value=m.date_range.to;
})();

// ─── 获取当前筛选后的数据 ───────────────────
function getComputedRange(){
  if(currentRange==='this-week'){
    const now=new Date(); const d=now.getDay()||7;
    const mon=new Date(now); mon.setDate(now.getDate()-d+1);
    const sun=new Date(mon); sun.setDate(mon.getDate()+6);
    return {f:dateStr(mon),t:dateStr(sun)};
  }
  if(currentRange==='this-month'){
    const now=new Date();
    return {f:now.getFullYear()+'-'+pad2(now.getMonth()+1)+'-01',t:dateStr(now)};
  }
  if(currentRange==='this-year'){
    const now=new Date();
    return {f:now.getFullYear()+'-01-01',t:dateStr(now)};
  }
  return {f:fromDate,t:toDate};
}

function getFilteredDays(){
  let blocks = data.blocks.slice();

  // 日期范围
  if(currentRange!=='all'){
    const {f,t}=getComputedRange();
    fromDate=f; toDate=t;
    blocks=blocks.filter(b=>b.date>=f&&b.date<=t);
  }

  // 星期筛选
  const dows=[];
  document.querySelectorAll('.dow-cb:checked').forEach(cb=>dows.push(parseInt(cb.value)));
  if(dows.length<7)blocks=blocks.filter(b=>dows.includes(getDow(b.date)));

  // 按天聚合
  const days={};
  blocks.forEach(b=>{
    if(!days[b.date])days[b.date]={categories:{},total:0,group:{}};
    if(!days[b.date].categories[b.category])days[b.date].categories[b.category]=0;
    days[b.date].categories[b.category]+=b.duration_min;
    days[b.date].total+=b.duration_min;
    days[b.date].group[b.group]=1;
  });

  // 双滑块范围过滤
  const low=parseFloat(document.getElementById('min-hours-low').value);
  const high=parseFloat(document.getElementById('min-hours-high').value);
  const dates=Object.keys(days).sort();
  return dates.map(d=>{
    const day=days[d];
    const hours=Math.round(day.total/60*10)/10;
    const outside=hours<low||hours>high;
    return {date:d,day,hours,outside};
  }).filter(d=>!d.outside);
}

// ─── 获取分类当前层级列表 ───────────────────
function getActiveCategories(){
  if(catView==='group'){
    if(expandedGroup){
      const g=groups.find(x=>x.name===expandedGroup);
      return g?g.cats.map(c=>c.name):[];
    }
    return groups.map(g=>g.name);
  }
  // 二级分类: 所有 tags
  return data.categories.map(c=>c.name).sort();
}

// ─── 自动调整滑块范围 ───────────────────────
function getMaxDailyHours(){
  let blocks=data.blocks.slice();
  if(currentRange!=='all'){const{f,t}=getComputedRange();blocks=blocks.filter(b=>b.date>=f&&b.date<=t)}
  const dows=[];document.querySelectorAll('.dow-cb:checked').forEach(cb=>dows.push(parseInt(cb.value)));
  if(dows.length<7)blocks=blocks.filter(b=>dows.includes(getDow(b.date)));
  const days={};blocks.forEach(b=>{days[b.date]=(days[b.date]||0)+b.duration_min});
  const maxH=Math.ceil(Math.max(...Object.values(days).map(m=>Math.round(m/60*10)/10),0));
  return maxH||24;
}
function updateSliderBounds(){
  const maxH=getMaxDailyHours();
  const low=document.getElementById('min-hours-low'),high=document.getElementById('min-hours-high');
  low.max=maxH;high.max=maxH;
  if(parseFloat(low.value)>maxH)low.value=maxH;
  if(parseFloat(high.value)>maxH)high.value=maxH;
  document.getElementById('range-label').textContent=parseFloat(low.value)+'h ~ '+parseFloat(high.value)+'h';
}

function getCategoryDisplayName(catName){
  const c=data.categories.find(x=>x.name===catName);
  return c?c.icon+' '+catName:catName;
}

function getGroupDisplayName(gName){
  const g=groups.find(x=>x.name===gName);
  return g?g.icon+' '+gName:gName;
}

function getCategoryColor(catName){
  // group view: use group color
  if(catView==='group'){
    if(expandedGroup)return catColors[catName]||'#94a3b8';
    return groupColors[catName]||'#94a3b8';
  }
  return catColors[catName]||'#94a3b8';
}

// ─── 渲染趋势图 ──────────────────────────────
function renderTrend(){
  const days=getFilteredDays();
  if(days.length===0){
    document.getElementById('trend-empty').classList.remove('hidden');
    if(trendChart){trendChart.destroy();trendChart=null}
    document.querySelector('#trendChart').style.display='none';
    return;
  }
  document.getElementById('trend-empty').classList.add('hidden');
  document.querySelector('#trendChart').style.display='';

  const labels=days.map(d=>d.date);
  const activeCats=getActiveCategories();

  const datasets = activeCats.map(catName=>{
    const isGroupView=catView==='group'&&!expandedGroup;
    const values=days.map(d=>{
      let mins=0;
      if(isGroupView){
        // group view: sum all sub-categories under this group
        const g=groups.find(x=>x.name===catName);
        if(g)Object.entries(d.day.categories).forEach(([c,m])=>{
          const cat=data.categories.find(x=>x.name===c);
          if(cat&&cat.group===g.name)mins+=m;
        });
      } else {
        mins=d.day.categories[catName]||0;
      }
      return Math.round(mins/60*10)/10;
    });
    return {
      label: getCategoryDisplayName(catName),
      data: values,
      borderColor: getCategoryColor(catName),
      backgroundColor: getCategoryColor(catName)+'15',
      pointBackgroundColor: getCategoryColor(catName),
      tension: 0.3,
      fill: false,
      pointRadius: 2,
      pointHoverRadius: 6,
      borderWidth: 2
    };
  });

  // 添加总计时长的折线（虚线）
  const totalValues=days.map(d=>d.hours);
  datasets.push({
    label: '📊 总计时长',
    data: totalValues,
    borderColor: 'rgba(148,163,184,.5)',
    backgroundColor: 'transparent',
    borderDash: [5,3],
    borderWidth: 1.5,
    tension: .3,
    pointRadius: 0,
    order: 1
  });

  if(trendChart)trendChart.destroy();
  const ctx=document.getElementById('trendChart').getContext('2d');

  trendChart=new Chart(ctx,{
    type:'line',
    data:{labels,datasets},
    options:{
      responsive:true,
      maintainAspectRatio:true,
      aspectRatio:window.innerWidth<500?1.2:2,
      interaction:{mode:'index',intersect:false},
      onClick:(e,els)=>{
        if(els.length>0){
          const d=labels[els[0].index];
          const dsIdx=els[0].datasetIndex;
          const dsLabel=trendChart.data.datasets[dsIdx].label;

          // group view + not expanded → try drill-down
          if(catView==='group'&&!expandedGroup){
            const groupNames=groups.map(g=>g.name);
            const match=groupNames.find(n=>dsLabel.includes(n));
            if(match&&match!=='其他'){
              expandedGroup=match;
              document.getElementById('cat-breadcrumb').style.display='inline';
              document.getElementById('cat-current').textContent=' > '+getGroupDisplayName(match);
              renderAll();
              return;
            }
          }

          // 设置饼图日期
          document.getElementById('pie-date').value=d;
          selPieDate=d;
          renderPie();
        }
      },
      scales:{
        x:{
          ticks:{font:{size:10},maxTicksLimit:20},
          grid:{color:getComputedStyle(document.documentElement).getPropertyValue('--border').trim()}
        },
        y:{
          beginAtZero:true,
          title:{display:true,text:'小时',font:{size:12}},
          ticks:{font:{size:10},callback:v=>v+'h'},
          grid:{color:getComputedStyle(document.documentElement).getPropertyValue('--border').trim()}
        }
      },
      plugins:{
        tooltip:{
          mode:'index',
          callbacks:{
            title:items=>items[0].label,
            label:ctx=>ctx.dataset.label+': '+ctx.parsed.y.toFixed(1)+'h',
            afterBody:items=>{
              const d=labels[items[0].dataIndex];
              const day=days.find(x=>x.date===d);
              return day?'当日总计: '+day.hours.toFixed(1)+'h':'';
            }
          }
        },
        legend:{
          position:'bottom',
          labels:{
            boxWidth:12,boxHeight:12,padding:8,font:{size:10},
            usePointStyle:true,
            color:getComputedStyle(document.documentElement).getPropertyValue('--text').trim()
          },
          onClick:(e,legendItem)=>{
            const idx=legendItem.datasetIndex;
            const ci=trendChart;
            const meta=ci.getDatasetMeta(idx);
            meta.hidden=meta.hidden===null?!ci.data.datasets[idx].hidden:!meta.hidden;
            ci.update();
          }
        }
      }
    }
  });
}

// ─── 渲染饼图 ────────────────────────────────
function renderPie(){
  if(!selPieDate){
    document.getElementById('pie-empty').classList.remove('hidden');
    if(pieChart){pieChart.destroy();pieChart=null}
    document.querySelector('#pieChart').style.display='none';
    return;
  }
  const blocks=data.blocks.filter(b=>b.date===selPieDate);
  if(blocks.length===0){
    document.getElementById('pie-empty').classList.remove('hidden');
    if(pieChart){pieChart.destroy();pieChart=null}
    document.querySelector('#pieChart').style.display='none';
    return;
  }
  document.getElementById('pie-empty').classList.add('hidden');
  document.querySelector('#pieChart').style.display='';

  const totals={};
  blocks.forEach(b=>{
    const showGroup=catView==='group'&&!expandedGroup;
    const key=showGroup?b.group:b.category;
    totals[key]=(totals[key]||0)+b.duration_min;
  });
  const sorted=Object.entries(totals).sort((a,b)=>b[1]-a[1]);
  const labels=sorted.map(([k])=>getCategoryDisplayName(k));
  const values=sorted.map(([,v])=>Math.round(v/60*10)/10);
  const colors=sorted.map(([k])=>getCategoryColor(k));

  if(pieChart)pieChart.destroy();
  const ctx=document.getElementById('pieChart').getContext('2d');
  const totalHours=values.reduce((a,b)=>a+b,0);

  pieChart=new Chart(ctx,{
    type:'doughnut',
    data:{
      labels,datasets:[{
        data:values,
        backgroundColor:colors,
        borderColor:'transparent',borderWidth:0
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:true,
      aspectRatio:window.innerWidth<500?1:1.4,
      plugins:{
        title:{display:true,text:selPieDate+' · 共 '+totalHours.toFixed(1)+'h',font:{size:12}},
        tooltip:{
          callbacks:{
            label:ctx=>{
              const pct=((ctx.parsed/totalHours)*100).toFixed(1);
              return ctx.label+': '+ctx.parsed.toFixed(1)+'h ('+pct+'%)';
            }
          }
        },
        legend:{
          position:'bottom',
          labels:{
            boxWidth:12,boxHeight:12,padding:8,font:{size:10},
            usePointStyle:true,
            color:getComputedStyle(document.documentElement).getPropertyValue('--text').trim()
          }
        }
      }
    }
  });
}

// ─── 刷新全部 ────────────────────────────────
function renderAll(){renderTrend();renderPie()}

// ─── 绑定事件 ────────────────────────────────

// 日期范围按钮
document.querySelectorAll('#range-btns button').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('#range-btns button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentRange=btn.dataset.range;
    const cust=currentRange==='custom';
    document.getElementById('date-from').disabled=!cust;
    document.getElementById('date-to').disabled=!cust;

    // 显示当前计算范围
    if(!cust){
      const {f,t}=getComputedRange();
      if(btn.dataset.range!=='custom'){document.getElementById('date-from').value=f;document.getElementById('date-to').value=t}
    } else {
      fromDate=document.getElementById('date-from').value;toDate=document.getElementById('date-to').value;
    }
    renderTrend();
    updateSliderBounds();
    if(document.getElementById('pie-sync').checked){
      const days=getFilteredDays();
      if(days.length>0){selPieDate=days[days.length-1].date;document.getElementById('pie-date').value=selPieDate;renderPie()}
    }
  });
});

// 自定义日期
document.getElementById('date-from').addEventListener('change',function(){if(currentRange==='custom'){fromDate=this.value;renderTrend();updateSliderBounds()}});
document.getElementById('date-to').addEventListener('change',function(){if(currentRange==='custom'){toDate=this.value;renderTrend();updateSliderBounds()}});

// 星期筛选
document.querySelectorAll('.dow-cb').forEach(cb=>{
  cb.addEventListener('change',()=>{renderTrend();updateSliderBounds()});
});

// 双滑块范围
function updateRange(){
  const low=parseFloat(document.getElementById('min-hours-low').value);
  const high=parseFloat(document.getElementById('min-hours-high').value);
  document.getElementById('range-label').textContent=low+'h ~ '+high+'h';
  // 确保 low <= high
  if(low>high){document.getElementById('min-hours-low').value=high;document.getElementById('min-hours-high').value=low}
  renderTrend();
}
document.getElementById('min-hours-low').addEventListener('input',updateRange);
document.getElementById('min-hours-high').addEventListener('input',function(){
  const low=parseFloat(document.getElementById('min-hours-low').value);
  const high=parseFloat(this.value);
  document.getElementById('range-label').textContent=low+'h ~ '+high+'h';
  if(high<low){document.getElementById('min-hours-low').value=high;document.getElementById('min-hours-high').value=low}
  renderTrend();
});

// 分类视图切换
document.querySelectorAll('#cat-view-btns button').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('#cat-view-btns button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    catView=btn.dataset.view;
    expandedGroup=null;
    document.getElementById('cat-breadcrumb').style.display='none';
    renderAll();
  });
});

// 返回上层
document.getElementById('cat-back').addEventListener('click',()=>{
  expandedGroup=null;
  document.getElementById('cat-breadcrumb').style.display='none';
  renderAll();
});

// 饼图日期
document.getElementById('pie-date').addEventListener('change',function(){
  selPieDate=this.value;
  document.getElementById('pie-sync').checked=false;
  renderPie();
});
document.getElementById('pie-sync').addEventListener('change',function(){
  if(this.checked){
    const days=getFilteredDays();
    if(days.length>0){selPieDate=days[days.length-1].date;document.getElementById('pie-date').value=selPieDate;renderPie()}
  }
});

// 窗口 resize
window.addEventListener('resize',renderAll);

// ─── 首次渲染 ────────────────────────────────
// trigger initial date range
document.querySelector('#range-btns .active').click();

})();
</script>

<script>
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js');
</script>
